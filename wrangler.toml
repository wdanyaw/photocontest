name = "photocontest"
compatibility_date = "2025-01-01"
pages_build_output_dir = "public"

# База данных D1 (создаётся командой `wrangler d1 create photocontest`)
[[d1_databases]]
binding = "DB"
database_name = "photocontest"
# TODO: после создания БД вставить database_id из вывода команды
database_id = "ddfc2fab-2af4-418d-8523-da9a177c5606"

# Переменные (не секретные) — ID смарт-процесса и стадий
# TODO: заполнить все значения ниже после настройки смарт-процесса в Bitrix24
[vars]
# ID смарт-процесса (Entity Type ID). Пример: 1032
ENTITY_TYPE_ID = "1066"

# ID основной карточки (постоянный, ходит по кругу каждую неделю)
MAIN_CARD_ID = "2"

# ID стадии голосования (основная карточка тут = фаза VOTING)
# Формат: "DT1032_10:UC_xxxxx" или как отображается в Bitrix24
STAGE_2_ID = "DT1066_30:PREPARATION"

# ID стадии участников текущего конкурса (элементы тут = голосуем за них)
STAGE_3_ID = "DT1066_30:CLIENT"

# ID стадии закрытия голосования (основная карточка переходит сюда по расписанию)
STAGE_4_ID = "DT1066_30:UC_NUFYYB"

# ID победной стадии (сюда попадают элементы с Победитель=Да)
WINNER_STAGE_ID = "DT1066_30:SUCCESS"

# ID проигрышной стадии (не используется приложением, но для полноты)
LOSER_STAGE_ID = "DT1066_30:FAIL"

# API-имена полей на элементах-участниках смарт-процесса
# Обычно вида "ufCrm_1_1234567890" — посмотреть в админке смарт-процесса
FIELD_PHOTO = "UF_CRM_22_1776281092"               # Фото (тип: файл)
FIELD_CAPTION = "UF_CRM_22_1776281118"           # Подпись (строка)
FIELD_PARTICIPANT_NUM = "UF_CRM_22_1776281134"   # Номер участника (целое число)
FIELD_NAME = "UF_CRM_22_1776281146"            # Имя участника (строка)
FIELD_VOTE_COUNT = "UF_CRM_22_1776281155"     # Количество голосов (целое число) — заполняется приложением
FIELD_IS_WINNER = "UF_CRM_22_1776281165"       # Победитель (список Да/Нет) — заполняется приложением
FIELD_CONTEST_NUM = "UF_CRM_22_1776281181"          # Номер конкурса (целое число)
FIELD_CONTEST_DATE = "UF_CRM_22_1776281206"      # Дата конкурса (дата)

# Секреты задаются отдельно:
# wrangler pages secret put BITRIX_WEBHOOK_URL
#   Пример значения: https://portal.bitrix24.ru/rest/1/abcdef123456/
