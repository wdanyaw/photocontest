<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Фотоконкурс</title>
  <script src="//api.bitrix24.com/api/v1/"></script>
  <style>
    :root {
      --bg: #f4f6f9;
      --card: #ffffff;
      --text: #1a2734;
      --muted: #6b7a88;
      --accent: #2066b0;
      --accent-hover: #1a5695;
      --success: #2ea565;
      --warning: #e09a2b;
      --border: #e1e6ec;
      --shadow: 0 2px 8px rgba(0,0,0,0.04);
      --radius: 10px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.4;
    }

    .container { max-width: 900px; margin: 0 auto; }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      margin: 0 0 4px 0;
      font-size: 24px;
      font-weight: 600;
    }

    .header .subtitle {
      color: var(--muted);
      font-size: 14px;
    }

    .loading, .empty {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
    }

    .error {
      background: #fee;
      border: 1px solid #fcc;
      color: #c00;
      padding: 12px 16px;
      border-radius: var(--radius);
      margin-bottom: 16px;
    }

    /* Фаза VOTING — сетка 2 колонки */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
    }

    .participant {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: border-color 0.2s;
    }

    .participant.voted-by-me {
      border-color: var(--success);
    }

    .participant-photo {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      background: #eee;
      display: block;
    }

    .participant-body {
      padding: 14px 16px;
    }

    .participant-caption {
      font-size: 14px;
      margin-bottom: 8px;
      min-height: 2.8em;
    }

    .participant-num {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .participant-votes {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .vote-btn {
      width: 100%;
      padding: 10px;
      border: none;
      background: var(--accent);
      color: white;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .vote-btn:hover:not(:disabled) { background: var(--accent-hover); }
    .vote-btn:disabled {
      background: #cbd3db;
      color: #889;
      cursor: not-allowed;
    }

    .vote-btn.voted {
      background: var(--success);
      color: white;
    }

    /* Фаза RESULTS */
    .results-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .results-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .results-subtitle {
      color: var(--muted);
      font-size: 14px;
    }

    .winners-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .winner-card {
      background: var(--card);
      border: 3px solid var(--warning);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(224,154,43,0.15);
    }

    .winner-badge {
      background: var(--warning);
      color: white;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      padding: 6px;
      letter-spacing: 0.5px;
    }

    .winner-photo {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      background: #eee;
      display: block;
    }

    .winner-info {
      padding: 14px 16px;
      font-size: 14px;
    }

    .winner-caption {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .winner-meta {
      color: var(--muted);
      font-size: 13px;
      margin: 3px 0;
    }

    .winner-name {
      font-weight: 600;
      font-size: 14px;
      margin-top: 8px;
    }

    .winner-votes {
      display: inline-block;
      margin-top: 8px;
      background: var(--warning);
      color: white;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 13px;
      font-weight: 600;
    }

    /* CSS-сова (пиксель-арт) */
    .owl-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 32px;
      user-select: none;
    }

    .owl {
      image-rendering: pixelated;
      width: 128px;
      height: 128px;
      position: relative;
    }

    /* Сова нарисована через box-shadow от одного пикселя 8x8 */
    .owl-pixel {
      width: 8px;
      height: 8px;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* Тело совы — статичное */
    .owl-body {
      box-shadow:
        /* Уши */
        16px 8px 0 #5a3e1b, 24px 8px 0 #5a3e1b,
        80px 8px 0 #5a3e1b, 88px 8px 0 #5a3e1b,
        8px 16px 0 #5a3e1b, 16px 16px 0 #7a5230, 24px 16px 0 #7a5230,
        80px 16px 0 #7a5230, 88px 16px 0 #7a5230, 96px 16px 0 #5a3e1b,
        /* Голова */
        8px 24px 0 #7a5230, 16px 24px 0 #9e6b3f, 24px 24px 0 #9e6b3f, 32px 24px 0 #9e6b3f,
        40px 24px 0 #9e6b3f, 48px 24px 0 #9e6b3f, 56px 24px 0 #9e6b3f, 64px 24px 0 #9e6b3f,
        72px 24px 0 #9e6b3f, 80px 24px 0 #9e6b3f, 88px 24px 0 #9e6b3f, 96px 24px 0 #7a5230,
        8px 32px 0 #9e6b3f, 16px 32px 0 #c8975a, 24px 32px 0 #c8975a, 32px 32px 0 #c8975a,
        40px 32px 0 #c8975a, 48px 32px 0 #c8975a, 56px 32px 0 #c8975a, 64px 32px 0 #c8975a,
        72px 32px 0 #c8975a, 80px 32px 0 #c8975a, 88px 32px 0 #c8975a, 96px 32px 0 #9e6b3f,
        /* Лицо — верхний ряд */
        8px 40px 0 #9e6b3f, 16px 40px 0 #c8975a, 24px 40px 0 #f0d090,
        32px 40px 0 #f0d090, 40px 40px 0 #c8975a, 48px 40px 0 #c8975a,
        56px 40px 0 #c8975a, 64px 40px 0 #f0d090, 72px 40px 0 #f0d090,
        80px 40px 0 #c8975a, 88px 40px 0 #c8975a, 96px 40px 0 #9e6b3f,
        /* Нос */
        48px 56px 0 #e8a020, 56px 56px 0 #e8a020,
        48px 64px 0 #c8800a, 56px 64px 0 #c8800a,
        /* Тело */
        8px 72px 0 #7a5230, 16px 72px 0 #9e6b3f, 24px 72px 0 #9e6b3f,
        32px 72px 0 #c8975a, 40px 72px 0 #c8975a, 48px 72px 0 #9e6b3f,
        56px 72px 0 #9e6b3f, 64px 72px 0 #c8975a, 72px 72px 0 #c8975a,
        80px 72px 0 #9e6b3f, 88px 72px 0 #9e6b3f, 96px 72px 0 #7a5230,
        8px 80px 0 #7a5230, 16px 80px 0 #9e6b3f, 24px 80px 0 #c8975a,
        32px 80px 0 #c8975a, 40px 80px 0 #9e6b3f, 48px 80px 0 #9e6b3f,
        56px 80px 0 #9e6b3f, 64px 80px 0 #9e6b3f, 72px 80px 0 #c8975a,
        80px 80px 0 #c8975a, 88px 80px 0 #9e6b3f, 96px 80px 0 #7a5230,
        8px 88px 0 #5a3e1b, 16px 88px 0 #7a5230, 24px 88px 0 #9e6b3f,
        32px 88px 0 #9e6b3f, 40px 88px 0 #c8975a, 48px 88px 0 #c8975a,
        56px 88px 0 #c8975a, 64px 88px 0 #c8975a, 72px 88px 0 #9e6b3f,
        80px 88px 0 #9e6b3f, 88px 88px 0 #7a5230, 96px 88px 0 #5a3e1b,
        /* Лапы */
        24px 96px 0 #7a5230, 32px 96px 0 #7a5230, 40px 96px 0 #5a3e1b,
        64px 96px 0 #5a3e1b, 72px 96px 0 #7a5230, 80px 96px 0 #7a5230,
        16px 104px 0 #e8a020, 24px 104px 0 #e8a020, 32px 104px 0 #e8a020,
        40px 104px 0 #e8a020, 64px 104px 0 #e8a020, 72px 104px 0 #e8a020,
        80px 104px 0 #e8a020, 88px 104px 0 #e8a020;
    }

    /* Глаза — анимируются */
    .owl-eyes {
      animation: blink 4s infinite;
    }

    /* Открытые глаза */
    .owl-eyes {
      box-shadow:
        /* Левый глаз */
        16px 40px 0 #1a1a1a, 24px 40px 0 #1a1a1a,
        16px 48px 0 #1a1a1a, 24px 48px 0 #ffffff, 32px 48px 0 #1a1a1a,
        16px 56px 0 #1a1a1a, 24px 56px 0 #1a1a1a,
        /* Правый глаз */
        72px 40px 0 #1a1a1a, 80px 40px 0 #1a1a1a,
        64px 48px 0 #1a1a1a, 72px 48px 0 #ffffff, 80px 48px 0 #1a1a1a,
        72px 56px 0 #1a1a1a, 80px 56px 0 #1a1a1a;
    }

    @keyframes blink {
      0%, 90%, 100% {
        box-shadow:
          16px 40px 0 #1a1a1a, 24px 40px 0 #1a1a1a,
          16px 48px 0 #1a1a1a, 24px 48px 0 #ffffff, 32px 48px 0 #1a1a1a,
          16px 56px 0 #1a1a1a, 24px 56px 0 #1a1a1a,
          72px 40px 0 #1a1a1a, 80px 40px 0 #1a1a1a,
          64px 48px 0 #1a1a1a, 72px 48px 0 #ffffff, 80px 48px 0 #1a1a1a,
          72px 56px 0 #1a1a1a, 80px 56px 0 #1a1a1a;
      }
      /* Моргание — глаза закрыты */
      93%, 97% {
        box-shadow:
          16px 48px 0 #9e6b3f, 24px 48px 0 #9e6b3f, 32px 48px 0 #9e6b3f,
          64px 48px 0 #9e6b3f, 72px 48px 0 #9e6b3f, 80px 48px 0 #9e6b3f,
          16px 50px 0 #5a3e1b, 24px 50px 0 #5a3e1b, 32px 50px 0 #5a3e1b,
          64px 50px 0 #5a3e1b, 72px 50px 0 #5a3e1b, 80px 50px 0 #5a3e1b;
      }
    }

    .owl-label {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      z-index: 1000;
    }

    .toast.success { background: var(--success); }
    .toast.error { background: #c00; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Фотоконкурс</h1>
      <div class="subtitle" id="subtitle">Загрузка...</div>
    </div>
    <div id="app">
      <div class="loading">Загрузка...</div>
    </div>
  </div>

  <script>
    'use strict';

    const state = {
      authId: null,
      domain: null,
      phase: null,
      participants: [],
      userVote: null,
    };

    const app = document.getElementById('app');
    const subtitle = document.getElementById('subtitle');

    function setSubtitle(text) { subtitle.textContent = text; }

    function showError(msg) {
      app.innerHTML = `<div class="error">${escapeHtml(msg)}</div>`;
    }

    function escapeHtml(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function toast(msg, type = 'info') {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    function authParams() {
      return { auth_id: state.authId, domain: state.domain };
    }

    async function apiGet(path) {
      const url = new URL(path, location.origin);
      url.searchParams.set('auth_id', state.authId);
      url.searchParams.set('domain', state.domain);
      const res = await fetch(url.toString());
      const data = await res.json().catch(() => ({ error: 'Invalid response' }));
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    }

    async function apiPost(path, body = {}) {
      const res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...authParams(), ...body }),
      });
      const data = await res.json().catch(() => ({ error: 'Invalid response' }));
      if (!res.ok) {
        const err = new Error(data.error || `HTTP ${res.status}`);
        err.status = res.status;
        throw err;
      }
      return data;
    }

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function owlHtml() {
      return `
        <div class="owl-wrap">
          <div class="owl">
            <div class="owl-pixel owl-body"></div>
            <div class="owl-pixel owl-eyes"></div>
          </div>
          <div class="owl-label">Скоро что-то будет...</div>
        </div>
      `;
    }

    // ===== Рендер фаз =====

    function renderIdle() {
      setSubtitle('');
      app.innerHTML = `
        <div class="empty">
          <h2 style="margin-top:0;">Конкурс скоро начнётся</h2>
          <p>Сейчас активных голосований нет. Дождитесь сообщения в чате со ссылкой.</p>
        </div>
        ${owlHtml()}
      `;
    }

    function renderVoting() {
      setSubtitle(state.userVote ? 'Ваш голос учтён' : 'Проголосуйте за лучшую работу');
      const participants = shuffle(state.participants);

      if (participants.length === 0) {
        app.innerHTML = `<div class="empty">Участников в текущем конкурсе пока нет.</div>${owlHtml()}`;
        return;
      }

      const html = participants.map(p => {
        const isVotedByMe = String(state.userVote) === String(p.id);
        const cls = ['participant'];
        if (isVotedByMe) cls.push('voted-by-me');

        const btnLabel = isVotedByMe ? 'Ваш голос' : (state.userVote ? 'Вы уже голосовали' : 'Проголосовать');
        const btnCls = isVotedByMe ? 'vote-btn voted' : 'vote-btn';
        const disabled = state.userVote ? 'disabled' : '';

        return `
          <div class="${cls.join(' ')}" data-id="${escapeHtml(p.id)}">
            <img class="participant-photo" data-src="${escapeHtml(p.photoUrl)}" alt="Фото">
            <div class="participant-body">
              <div class="participant-caption">${escapeHtml(p.caption)}</div>
              <div class="participant-num">Участник №${escapeHtml(String(p.participantNum))}</div>
              <div class="participant-votes">Голосов: ${p.voteCount}</div>
              <button class="${btnCls}" ${disabled} data-vote="${escapeHtml(p.id)}">${btnLabel}</button>
            </div>
          </div>
        `;
      }).join('');

      app.innerHTML = `<div class="grid">${html}</div>`;

      app.querySelectorAll('[data-vote]').forEach(btn => {
        btn.addEventListener('click', () => handleVote(btn.dataset.vote));
      });

      loadImgsSequentially(app);
    }

    function renderResults() {
      const winners = state.participants.filter(p => p.isWinner);
      const contestNum = state.participants[0]?.contestNum ?? '';
      const count = winners.length;
      const title = count > 1 ? `Победители конкурса №${contestNum}` : `Победитель конкурса №${contestNum}`;

      setSubtitle('Голосование завершено');

      if (winners.length === 0) {
        app.innerHTML = `
          <div class="empty">Голосование завершено. Победители определяются...</div>
          ${owlHtml()}
        `;
        return;
      }

      const winnersHtml = winners.map(w => `
        <div class="winner-card">
          <div class="winner-badge">ПОБЕДИТЕЛЬ</div>
          <img class="winner-photo" data-src="${escapeHtml(w.photoUrl)}" alt="Фото">
          <div class="winner-info">
            <div class="winner-caption">${escapeHtml(w.caption)}</div>
            <div class="winner-meta">Участник №${escapeHtml(String(w.participantNum))}</div>
            <div class="winner-name">${escapeHtml(w.name || '')}</div>
            <span class="winner-votes">Голосов: ${w.voteCount}</span>
          </div>
        </div>
      `).join('');

      app.innerHTML = `
        <div class="results-header">
          <div class="results-title">${escapeHtml(title)}</div>
          <div class="results-subtitle">${count > 1 ? 'Ничья — несколько победителей' : ''}</div>
        </div>
        <div class="winners-grid">${winnersHtml}</div>
      `;

      loadImgsSequentially(app);
    }

    function loadImgsSequentially(container) {
      const imgs = Array.from(container.querySelectorAll('img[data-src]'));
      (async () => {
        for (const img of imgs) {
          img.src = img.dataset.src;
          await new Promise(r => setTimeout(r, 600));
        }
      })();
    }

    async function handleVote(participantId) {
      if (state.userVote) return;
      app.querySelectorAll('.vote-btn').forEach(b => b.disabled = true);

      try {
        const result = await apiPost('/api/vote', { participant_id: participantId });
        state.userVote = participantId;
        for (const p of state.participants) {
          p.voteCount = result.counts[String(p.id)] || 0;
        }
        renderVoting();
        toast('Голос учтён!', 'success');
      } catch (e) {
        if (e.status === 409) {
          state.userVote = 'other';
          renderVoting();
          toast('Вы уже голосовали в этом конкурсе', 'error');
        } else {
          toast('Ошибка: ' + e.message, 'error');
          await loadVoting();
        }
      }
    }

    // ===== Загрузчики данных =====

    async function loadVoting() {
      const data = await apiGet('/api/participants');
      state.participants = data.participants;
      state.userVote = data.userVote;
      renderVoting();
    }

    async function loadResults() {
      const data = await apiGet('/api/participants');
      state.participants = data.participants;
      renderResults();
    }

    // ===== Точка входа =====

    async function init() {
      if (typeof BX24 === 'undefined') {
        showError('Приложение должно быть открыто внутри Bitrix24');
        return;
      }

      try {
        await new Promise((resolve) => BX24.init(resolve));
        const auth = BX24.getAuth();
        if (!auth || !auth.access_token || !auth.domain) {
          showError('Не удалось получить авторизацию Bitrix24');
          return;
        }
        state.authId = auth.access_token;
        state.domain = auth.domain;
      } catch (e) {
        showError('Ошибка инициализации BX24: ' + e.message);
        return;
      }

      try {
        const status = await apiGet('/api/status');
        state.phase = status.phase;

        if (state.phase === 'VOTING') {
          await loadVoting();
        } else if (state.phase === 'RESULTS') {
          await loadResults();
        } else {
          renderIdle();
        }
      } catch (e) {
        showError('Ошибка: ' + e.message);
      }
    }

    init();
  </script>
</body>
</html>
