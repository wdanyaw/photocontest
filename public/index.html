<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Фотоконкурс</title>
  <script src="//api.bitrix24.com/api/v1/"></script>
  <style>
    :root {
      --bg: #f4f6f9;
      --card: #ffffff;
      --text: #1a2734;
      --muted: #6b7a88;
      --accent: #2066b0;
      --accent-hover: #1a5695;
      --success: #2ea565;
      --warning: #e09a2b;
      --border: #e1e6ec;
      --shadow: 0 2px 8px rgba(0,0,0,0.04);
      --radius: 10px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.4;
    }

    .container { max-width: 900px; margin: 0 auto; }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      margin: 0 0 4px 0;
      font-size: 24px;
      font-weight: 600;
    }

    .header .subtitle {
      color: var(--muted);
      font-size: 14px;
    }

    .loading, .empty {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
    }

    .error {
      background: #fee;
      border: 1px solid #fcc;
      color: #c00;
      padding: 12px 16px;
      border-radius: var(--radius);
      margin-bottom: 16px;
    }

    /* Фаза VOTING — сетка 2 колонки */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
    }

    .participant {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: border-color 0.2s;
    }

    .participant.voted-by-me {
      border-color: var(--success);
    }

    .participant.is-winner {
      border-color: var(--warning);
    }

    .participant-photo {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      background: #eee;
      display: block;
    }

    .participant-body {
      padding: 14px 16px;
    }

    .participant-caption {
      font-size: 14px;
      margin-bottom: 8px;
      min-height: 2.8em;
    }

    .participant-num {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .participant-name {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .participant-votes {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .vote-btn {
      width: 100%;
      padding: 10px;
      border: none;
      background: var(--accent);
      color: white;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .vote-btn:hover:not(:disabled) { background: var(--accent-hover); }
    .vote-btn:disabled {
      background: #cbd3db;
      color: #889;
      cursor: not-allowed;
    }

    .vote-btn.voted {
      background: var(--success);
      color: white;
    }

    /* Фаза ARCHIVE */
    .archive-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 16px;
      background: var(--card);
      border-radius: var(--radius);
      margin-bottom: 20px;
    }

    .contest {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 16px;
    }

    .contest-header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
      margin-bottom: 16px;
      font-weight: 600;
      font-size: 15px;
    }

    .contest-date { color: var(--muted); font-weight: 400; }

    .winners-row {
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr;
    }

    .winner-card {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .winner-photo {
      width: 160px;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
      background: #eee;
    }

    .winner-info { flex: 1; font-size: 14px; }
    .winner-info .row { margin: 3px 0; }
    .winner-info .label { color: var(--muted); }

    @media (max-width: 500px) {
      .winner-card { flex-direction: column; }
      .winner-photo { width: 100%; height: auto; aspect-ratio: 4/3; }
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      z-index: 1000;
    }

    .toast.success { background: var(--success); }
    .toast.error { background: #c00; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Фотоконкурс</h1>
      <div class="subtitle" id="subtitle">Загрузка...</div>
    </div>
    <div id="app">
      <div class="loading">Загрузка...</div>
    </div>
  </div>

  <script>
    'use strict';

    // Состояние приложения
    const state = {
      authId: null,
      domain: null,
      phase: null,
      participants: [],
      userVote: null,
      contests: [],
    };

    const app = document.getElementById('app');
    const subtitle = document.getElementById('subtitle');

    function setSubtitle(text) { subtitle.textContent = text; }

    function showError(msg) {
      app.innerHTML = `<div class="error">${escapeHtml(msg)}</div>`;
    }

    function escapeHtml(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function toast(msg, type = 'info') {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    // Базовые параметры для всех запросов к бэкенду
    function authParams() {
      return {
        auth_id: state.authId,
        domain: state.domain,
      };
    }

    async function apiGet(path) {
      const url = new URL(path, location.origin);
      url.searchParams.set('auth_id', state.authId);
      url.searchParams.set('domain', state.domain);
      const res = await fetch(url.toString());
      const data = await res.json().catch(() => ({ error: 'Invalid response' }));
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    }

    async function apiPost(path, body = {}) {
      const res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...authParams(), ...body }),
      });
      const data = await res.json().catch(() => ({ error: 'Invalid response' }));
      if (!res.ok) {
        const err = new Error(data.error || `HTTP ${res.status}`);
        err.status = res.status;
        throw err;
      }
      return data;
    }

    // Шаффл массива (Fisher-Yates) — чтобы порядок участников не давал преимущество
    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // Форматирование даты: "15 апреля 2026"
    const MONTHS = ['января','февраля','марта','апреля','мая','июня',
                    'июля','августа','сентября','октября','ноября','декабря'];
    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      return `${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
    }

    // ===== Рендер фаз =====

    function renderIdle() {
      setSubtitle('');
      app.innerHTML = `
        <div class="empty">
          <h2 style="margin-top:0;">Конкурс скоро начнётся</h2>
          <p>Сейчас активных голосований нет. Дождитесь сообщения в чате со ссылкой.</p>
        </div>
      `;
    }

    function renderVoting() {
      setSubtitle(state.userVote ? 'Ваш голос учтён' : 'Проголосуйте за лучшую работу');
      const participants = shuffle(state.participants);

      if (participants.length === 0) {
        app.innerHTML = `<div class="empty">Участников в текущем конкурсе пока нет.</div>`;
        return;
      }

      const html = participants.map(p => {
        const isVotedByMe = String(state.userVote) === String(p.id);
        const cls = ['participant'];
        if (isVotedByMe) cls.push('voted-by-me');

        const btnLabel = isVotedByMe ? 'Ваш голос' : (state.userVote ? 'Вы уже голосовали' : 'Проголосовать');
        const btnCls = isVotedByMe ? 'vote-btn voted' : 'vote-btn';
        const disabled = state.userVote ? 'disabled' : '';

        return `
          <div class="${cls.join(' ')}" data-id="${escapeHtml(p.id)}">
            <img class="participant-photo" src="${escapeHtml(p.photoUrl)}" alt="Фото" loading="lazy">
            <div class="participant-body">
              <div class="participant-caption">${escapeHtml(p.caption)}</div>
              <div class="participant-num">Участник №${escapeHtml(p.participantNum)}</div>
              <div class="participant-votes">Голосов: ${p.voteCount}</div>
              <button class="${btnCls}" ${disabled} data-vote="${escapeHtml(p.id)}">${btnLabel}</button>
            </div>
          </div>
        `;
      }).join('');

      app.innerHTML = `<div class="grid">${html}</div>`;

      app.querySelectorAll('[data-vote]').forEach(btn => {
        btn.addEventListener('click', () => handleVote(btn.dataset.vote));
      });
    }

    async function handleVote(participantId) {
      if (state.userVote) return;

      // Оптимистично блокируем кнопки
      app.querySelectorAll('.vote-btn').forEach(b => b.disabled = true);

      try {
        const result = await apiPost('/api/vote', { participant_id: participantId });
        state.userVote = participantId;
        // Обновим счётчики в state
        for (const p of state.participants) {
          p.voteCount = result.counts[String(p.id)] || 0;
        }
        renderVoting();
        toast('Голос учтён!', 'success');
      } catch (e) {
        if (e.status === 409) {
          state.userVote = 'other';
          renderVoting();
          toast('Вы уже голосовали в этом конкурсе', 'error');
        } else {
          toast('Ошибка: ' + e.message, 'error');
          // Разблокируем кнопки при ошибке
          await loadVoting();
        }
      }
    }

    function renderArchive() {
      setSubtitle('Активных конкурсов нет, голосование завершено');
      if (state.contests.length === 0) {
        app.innerHTML = `<div class="archive-empty">Архив пока пуст</div>`;
        return;
      }

      const html = state.contests.map(c => {
        const winnersHtml = c.winners.map(w => `
          <div class="winner-card">
            <img class="winner-photo" src="${escapeHtml(w.photoUrl)}" alt="Фото">
            <div class="winner-info">
              <div class="row"><span class="label">Подпись:</span> ${escapeHtml(w.caption)}</div>
              <div class="row"><span class="label">Участник:</span> №${escapeHtml(w.participantNum)}</div>
              <div class="row"><span class="label">Голосов:</span> ${w.voteCount}</div>
              <div class="row"><span class="label">Имя:</span> ${escapeHtml(w.name)}</div>
            </div>
          </div>
        `).join('');

        return `
          <div class="contest">
            <div class="contest-header">
              Конкурс №${escapeHtml(c.contestNum)}
              <span class="contest-date"> · ${escapeHtml(formatDate(c.date))}</span>
            </div>
            <div class="winners-row">${winnersHtml}</div>
          </div>
        `;
      }).join('');

      app.innerHTML = html;
    }

    // ===== Загрузчики данных =====

    async function loadVoting() {
      const data = await apiGet('/api/participants');
      state.participants = data.participants;
      state.userVote = data.userVote;
      renderVoting();
    }

    async function loadArchive() {
      const data = await apiGet('/api/winners');
      state.contests = data.contests;
      renderArchive();
    }

    // ===== Точка входа =====

    async function init() {
      // Получаем AUTH_ID через BX24.js
      if (typeof BX24 === 'undefined') {
        showError('Приложение должно быть открыто внутри Bitrix24');
        return;
      }

      try {
        await new Promise((resolve) => BX24.init(resolve));
        const auth = BX24.getAuth();
        if (!auth || !auth.access_token || !auth.domain) {
          showError('Не удалось получить авторизацию Bitrix24');
          return;
        }
        state.authId = auth.access_token;
        state.domain = auth.domain;
      } catch (e) {
        showError('Ошибка инициализации BX24: ' + e.message);
        return;
      }

      try {
        const status = await apiGet('/api/status');
        state.phase = status.phase;

        if (state.phase === 'VOTING') {
          await loadVoting();
        } else if (state.phase === 'ARCHIVE') {
          await loadArchive();
        } else {
          renderIdle();
        }
      } catch (e) {
        showError('Ошибка: ' + e.message);
      }
    }

    init();
  </script>
</body>
</html>
