<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Фотоконкурс</title>
  <script src="//api.bitrix24.com/api/v1/"></script>
  <style>
    :root {
      --bg: #f4f6f9;
      --card: #ffffff;
      --text: #1a2734;
      --muted: #6b7a88;
      --accent: #2066b0;
      --accent-hover: #1a5695;
      --success: #2ea565;
      --warning: #e09a2b;
      --border: #e1e6ec;
      --shadow: 0 2px 8px rgba(0,0,0,0.04);
      --radius: 10px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.4;
    }

    .container { max-width: 900px; margin: 0 auto; }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      margin: 0 0 4px 0;
      font-size: 24px;
      font-weight: 600;
    }

    .header .subtitle {
      color: var(--muted);
      font-size: 14px;
    }

    .loading, .empty {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
    }

    .error {
      background: #fee;
      border: 1px solid #fcc;
      color: #c00;
      padding: 12px 16px;
      border-radius: var(--radius);
      margin-bottom: 16px;
    }

    /* Фаза VOTING — сетка 2 колонки */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
    }

    .participant {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: border-color 0.2s;
    }

    .participant.voted-by-me {
      border-color: var(--success);
    }

    .participant-photo {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      background: #eee;
      display: block;
    }

    .participant-body {
      padding: 14px 16px;
    }

    .participant-caption {
      font-size: 14px;
      margin-bottom: 8px;
      min-height: 2.8em;
    }

    .participant-num {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .participant-votes {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .vote-btn {
      width: 100%;
      padding: 10px;
      border: none;
      background: var(--accent);
      color: white;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .vote-btn:hover:not(:disabled) { background: var(--accent-hover); }
    .vote-btn:disabled {
      background: #cbd3db;
      color: #889;
      cursor: not-allowed;
    }

    .vote-btn.voted {
      background: var(--success);
      color: white;
    }

    /* Фаза RESULTS */
    .results-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .results-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .results-subtitle {
      color: var(--muted);
      font-size: 14px;
    }

    .winners-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .winner-card {
      background: var(--card);
      border: 3px solid var(--warning);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(224,154,43,0.15);
    }

    .winner-badge {
      background: var(--warning);
      color: white;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      padding: 6px;
      letter-spacing: 0.5px;
    }

    .winner-photo {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      background: #eee;
      display: block;
    }

    .winner-info {
      padding: 14px 16px;
      font-size: 14px;
    }

    .winner-caption {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .winner-meta {
      color: var(--muted);
      font-size: 13px;
      margin: 3px 0;
    }

    .winner-name {
      font-weight: 600;
      font-size: 14px;
      margin-top: 8px;
    }

    .winner-votes {
      display: inline-block;
      margin-top: 8px;
      background: var(--warning);
      color: white;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 13px;
      font-weight: 600;
    }

    /* SVG-сова */
    .owl-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 32px;
      user-select: none;
    }

    .owl-svg {
      width: 160px;
      height: 180px;
    }

    /* Моргание — верхние веки опускаются */
    .owl-eyelid-left,
    .owl-eyelid-right {
      transform-origin: center top;
      animation: blink 4s infinite;
    }

    .owl-eyelid-right {
      animation-delay: 0.04s;
    }

    @keyframes blink {
      0%, 88%, 100% { transform: scaleY(0); }
      92%, 96%      { transform: scaleY(1); }
    }

    .owl-label {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      z-index: 1000;
    }

    .toast.success { background: var(--success); }
    .toast.error { background: #c00; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Фотоконкурс</h1>
      <div class="subtitle" id="subtitle">Загрузка...</div>
    </div>
    <div id="app">
      <div class="loading">Загрузка...</div>
    </div>
  </div>

  <script>
    'use strict';

    const state = {
      authId: null,
      domain: null,
      phase: null,
      participants: [],
      userVote: null,
    };

    const app = document.getElementById('app');
    const subtitle = document.getElementById('subtitle');

    function setSubtitle(text) { subtitle.textContent = text; }

    function showError(msg) {
      app.innerHTML = `<div class="error">${escapeHtml(msg)}</div>`;
    }

    function escapeHtml(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function toast(msg, type = 'info') {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    function authParams() {
      return { auth_id: state.authId, domain: state.domain };
    }

    async function apiGet(path) {
      const url = new URL(path, location.origin);
      url.searchParams.set('auth_id', state.authId);
      url.searchParams.set('domain', state.domain);
      const res = await fetch(url.toString());
      const data = await res.json().catch(() => ({ error: 'Invalid response' }));
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    }

    async function apiPost(path, body = {}) {
      const res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...authParams(), ...body }),
      });
      const data = await res.json().catch(() => ({ error: 'Invalid response' }));
      if (!res.ok) {
        const err = new Error(data.error || `HTTP ${res.status}`);
        err.status = res.status;
        throw err;
      }
      return data;
    }

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function owlHtml() {
      return `
        <div class="owl-wrap">
          <svg class="owl-svg" viewBox="0 0 160 180" xmlns="http://www.w3.org/2000/svg">
            <!-- Тело — пушистый белый/серый овал -->
            <ellipse cx="80" cy="130" rx="46" ry="48" fill="#e8e8e8"/>
            <ellipse cx="80" cy="128" rx="36" ry="40" fill="#f5f5f5"/>
            <!-- Крылья -->
            <ellipse cx="36" cy="138" rx="22" ry="32" fill="#b0b0b0" transform="rotate(-12 36 138)"/>
            <ellipse cx="124" cy="138" rx="22" ry="32" fill="#b0b0b0" transform="rotate(12 124 138)"/>
            <!-- Внутренняя грудка -->
            <ellipse cx="80" cy="140" rx="24" ry="30" fill="#f8f8f8"/>
            <!-- Голова -->
            <ellipse cx="80" cy="72" rx="42" ry="40" fill="#d0d0d0"/>
            <ellipse cx="80" cy="72" rx="34" ry="33" fill="#e4e4e4"/>
            <!-- Ушки-рожки -->
            <polygon points="52,38 44,14 60,34" fill="#b0b0b0"/>
            <polygon points="108,38 116,14 100,34" fill="#b0b0b0"/>
            <polygon points="53,36 47,18 59,33" fill="#c8c8c8"/>
            <polygon points="107,36 113,18 101,33" fill="#c8c8c8"/>
            <!-- Белые пятна вокруг глаз -->
            <circle cx="62" cy="72" r="20" fill="#f5f5f5"/>
            <circle cx="98" cy="72" r="20" fill="#f5f5f5"/>
            <!-- Оправа очков — жёлтая -->
            <circle cx="62" cy="72" r="17" fill="none" stroke="#f0c020" stroke-width="4"/>
            <circle cx="98" cy="72" r="17" fill="none" stroke="#f0c020" stroke-width="4"/>
            <!-- Перемычка очков -->
            <path d="M79 72 Q80 68 81 72" fill="none" stroke="#f0c020" stroke-width="3"/>
            <!-- Дужки очков -->
            <path d="M45 67 Q36 62 34 66" fill="none" stroke="#f0c020" stroke-width="3" stroke-linecap="round"/>
            <path d="M115 67 Q124 62 126 66" fill="none" stroke="#f0c020" stroke-width="3" stroke-linecap="round"/>
            <!-- Радужка — янтарная -->
            <circle cx="62" cy="72" r="12" fill="#d4820a"/>
            <circle cx="98" cy="72" r="12" fill="#d4820a"/>
            <!-- Зрачок -->
            <circle cx="62" cy="72" r="7" fill="#1a1a1a"/>
            <circle cx="98" cy="72" r="7" fill="#1a1a1a"/>
            <!-- Блик в глазу -->
            <circle cx="66" cy="68" r="3" fill="white" opacity="0.9"/>
            <circle cx="102" cy="68" r="3" fill="white" opacity="0.9"/>
            <!-- Веки (моргание) — анимированы через CSS -->
            <clipPath id="leftEyeClip">
              <circle cx="62" cy="72" r="16"/>
            </clipPath>
            <clipPath id="rightEyeClip">
              <circle cx="98" cy="72" r="16"/>
            </clipPath>
            <rect class="owl-eyelid-left" x="46" y="56" width="32" height="16" rx="2"
              fill="#d8d8d8" clip-path="url(#leftEyeClip)"/>
            <rect class="owl-eyelid-right" x="82" y="56" width="32" height="16" rx="2"
              fill="#d8d8d8" clip-path="url(#rightEyeClip)"/>
            <!-- Клюв -->
            <polygon points="80,83 74,95 86,95" fill="#c8780a"/>
            <polygon points="80,83 74,90 86,90" fill="#e8960e"/>
            <!-- Лапы -->
            <rect x="62" y="172" width="7" height="10" rx="2" fill="#c8780a"/>
            <rect x="72" y="172" width="7" height="10" rx="2" fill="#c8780a"/>
            <rect x="81" y="172" width="7" height="10" rx="2" fill="#c8780a"/>
            <rect x="91" y="172" width="7" height="10" rx="2" fill="#c8780a"/>
            <rect x="60" y="168" width="36" height="8" rx="3" fill="#d4880c"/>
          </svg>
          <div class="owl-label">Скоро что-то будет...</div>
        </div>
      `;
    }

    // ===== Рендер фаз =====

    function renderIdle() {
      setSubtitle('');
      app.innerHTML = `
        <div class="empty">
          <h2 style="margin-top:0;">Конкурс скоро начнётся</h2>
          <p>Сейчас активных голосований нет. Дождитесь сообщения в чате со ссылкой.</p>
        </div>
        ${owlHtml()}
      `;
    }

    function renderVoting() {
      setSubtitle(state.userVote ? 'Ваш голос учтён' : 'Проголосуйте за лучшую работу');
      const participants = shuffle(state.participants);

      if (participants.length === 0) {
        app.innerHTML = `<div class="empty">Участников в текущем конкурсе пока нет.</div>${owlHtml()}`;
        return;
      }

      const html = participants.map(p => {
        const isVotedByMe = String(state.userVote) === String(p.id);
        const cls = ['participant'];
        if (isVotedByMe) cls.push('voted-by-me');

        const btnLabel = isVotedByMe ? 'Ваш голос' : (state.userVote ? 'Вы уже голосовали' : 'Проголосовать');
        const btnCls = isVotedByMe ? 'vote-btn voted' : 'vote-btn';
        const disabled = state.userVote ? 'disabled' : '';

        return `
          <div class="${cls.join(' ')}" data-id="${escapeHtml(p.id)}">
            <img class="participant-photo" data-src="${escapeHtml(p.photoUrl)}" alt="Фото">
            <div class="participant-body">
              <div class="participant-caption">${escapeHtml(p.caption)}</div>
              <div class="participant-num">Участник №${escapeHtml(String(p.participantNum))}</div>
              <div class="participant-votes">Голосов: ${p.voteCount}</div>
              <button class="${btnCls}" ${disabled} data-vote="${escapeHtml(p.id)}">${btnLabel}</button>
            </div>
          </div>
        `;
      }).join('');

      app.innerHTML = `<div class="grid">${html}</div>`;

      app.querySelectorAll('[data-vote]').forEach(btn => {
        btn.addEventListener('click', () => handleVote(btn.dataset.vote));
      });

      loadImgsSequentially(app);
    }

    function renderResults() {
      const winners = state.participants.filter(p => p.isWinner);
      const contestNum = state.participants[0]?.contestNum ?? '';
      const count = winners.length;
      const title = count > 1 ? `Победители конкурса №${contestNum}` : `Победитель конкурса №${contestNum}`;

      setSubtitle('Голосование завершено');

      if (winners.length === 0) {
        app.innerHTML = `
          <div class="empty">Голосование завершено. Победители определяются...</div>
          ${owlHtml()}
        `;
        return;
      }

      const winnersHtml = winners.map(w => `
        <div class="winner-card">
          <div class="winner-badge">ПОБЕДИТЕЛЬ</div>
          <img class="winner-photo" data-src="${escapeHtml(w.photoUrl)}" alt="Фото">
          <div class="winner-info">
            <div class="winner-caption">${escapeHtml(w.caption)}</div>
            <div class="winner-meta">Участник №${escapeHtml(String(w.participantNum))}</div>
            <div class="winner-name">${escapeHtml(w.name || '')}</div>
            <span class="winner-votes">Голосов: ${w.voteCount}</span>
          </div>
        </div>
      `).join('');

      app.innerHTML = `
        <div class="results-header">
          <div class="results-title">${escapeHtml(title)}</div>
          <div class="results-subtitle">${count > 1 ? 'Ничья — несколько победителей' : ''}</div>
        </div>
        <div class="winners-grid">${winnersHtml}</div>
      `;

      loadImgsSequentially(app);
    }

    function loadImgsSequentially(container) {
      const imgs = Array.from(container.querySelectorAll('img[data-src]'));
      (async () => {
        for (const img of imgs) {
          img.src = img.dataset.src;
          await new Promise(r => setTimeout(r, 600));
        }
      })();
    }

    async function handleVote(participantId) {
      if (state.userVote) return;
      app.querySelectorAll('.vote-btn').forEach(b => b.disabled = true);

      try {
        const result = await apiPost('/api/vote', { participant_id: participantId });
        state.userVote = participantId;
        for (const p of state.participants) {
          p.voteCount = result.counts[String(p.id)] || 0;
        }
        renderVoting();
        toast('Голос учтён!', 'success');
      } catch (e) {
        if (e.status === 409) {
          state.userVote = 'other';
          renderVoting();
          toast('Вы уже голосовали в этом конкурсе', 'error');
        } else {
          toast('Ошибка: ' + e.message, 'error');
          await loadVoting();
        }
      }
    }

    // ===== Загрузчики данных =====

    async function loadVoting() {
      const data = await apiGet('/api/participants');
      state.participants = data.participants;
      state.userVote = data.userVote;
      renderVoting();
    }

    async function loadResults() {
      const data = await apiGet('/api/participants');
      state.participants = data.participants;
      renderResults();
    }

    // ===== Точка входа =====

    async function init() {
      if (typeof BX24 === 'undefined') {
        showError('Приложение должно быть открыто внутри Bitrix24');
        return;
      }

      try {
        await new Promise((resolve) => BX24.init(resolve));
        const auth = BX24.getAuth();
        if (!auth || !auth.access_token || !auth.domain) {
          showError('Не удалось получить авторизацию Bitrix24');
          return;
        }
        state.authId = auth.access_token;
        state.domain = auth.domain;
      } catch (e) {
        showError('Ошибка инициализации BX24: ' + e.message);
        return;
      }

      try {
        const status = await apiGet('/api/status');
        state.phase = status.phase;

        if (state.phase === 'VOTING') {
          await loadVoting();
        } else if (state.phase === 'RESULTS') {
          await loadResults();
        } else {
          renderIdle();
        }
      } catch (e) {
        showError('Ошибка: ' + e.message);
      }
    }

    init();
  </script>
</body>
</html>
